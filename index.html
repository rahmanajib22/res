<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Director's Cut | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #ff003c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* 1. Cinematic Smooth Scroll */
        html.lenis { height: auto; }
        .lenis-smooth { scroll-behavior: auto !important; }

        /* 2. Hero: Zoom Reveal */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 15vw;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        /* 3. The Stacking Section (Pinning Logic) */
        .work-section {
            position: relative;
            background: #050505;
            height: 100vh; /* Added explicit height */
        }

        .panel {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            visibility: hidden;
            will-change: transform;
        }

        /* Added z-index for proper stacking */
        #panel-1 { z-index: 1; }
        #panel-2 { z-index: 2; }
        #panel-3 { z-index: 3; }

        .card {
            width: 70vw;
            height: 70vh;
            background: #111;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 110%;
            height: 110%;
            object-fit: cover;
            opacity: 0.5;
            position: absolute;
        }

        .card h2 {
            position: relative;
            font-size: 8vw;
            z-index: 2;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* 4. The Conveyor (Horizontal Scroll) */
        .conveyor-outer {
            height: 300vh; /* Scroll distance */
            background: var(--accent);
        }
        .conveyor-sticky {
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .conveyor-list {
            display: flex;
            white-space: nowrap;
            /* Removed padding-left: 100vw - starts from left edge */
        }
        .conveyor-item {
            font-size: 20vh;
            font-weight: 900;
            color: #000;
            margin-right: 100px;
            flex-shrink: 0; /* Prevent items from shrinking */
        }

        /* 5. Split Text Reveal */
        .reveal-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #000;
            overflow: hidden;
        }
        .reveal-text {
            font-size: 10vw;
            display: flex;
            gap: 20px;
        }
        /* Set initial positions in CSS */
        .word-left { transform: translateX(-100vw); }
        .word-right { transform: translateX(100vw); }

        .footer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <main>
        <section class="hero">
            <h1 class="hero-title">SCROLL</h1>
        </section>

        <section class="work-section" id="work-trigger">
            <div class="panel" id="panel-1">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1000" alt="Design">
                    <h2>DESIGN</h2>
                </div>
            </div>
            <div class="panel" id="panel-2">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?auto=format&fit=crop&q=80&w=1000" alt="Motion">
                    <h2>MOTION</h2>
                </div>
            </div>
            <div class="panel" id="panel-3">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=1500" alt="Code">
                    <h2>CODE</h2>
                </div>
            </div>
        </section>

        <section class="conveyor-outer">
            <div class="conveyor-sticky">
                <div class="conveyor-list">
                    <div class="conveyor-item">CINEMATIC</div>
                    <div class="conveyor-item">PRECISION</div>
                    <div class="conveyor-item">INTERACTIVE</div>
                    <div class="conveyor-item">CINEMATIC</div> <!-- Duplicate for seamless loop -->
                    <div class="conveyor-item">PRECISION</div>
                    <div class="conveyor-item">INTERACTIVE</div>
                </div>
            </div>
        </section>

        <section class="reveal-section">
            <div class="reveal-text">
                <div class="word-left">CREATIVE</div>
                <div class="word-right">SOUL</div>
            </div>
        </section>

        <footer class="footer">
            <h2 id="outro-text">GENESIS 2026</h2>
        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Lenis Smooth Scrolling (Inertia setup)
        const lenis = new Lenis({
            duration: 1.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
        });
        
        // Connect Lenis to GSAP ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);
        
        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });
        
        gsap.ticker.lagSmoothing(0);

        // 2. Hero Action: Massive Zoom (Reduced scale for better performance)
        gsap.to(".hero-title", {
            scale: 5, // Reduced from 50 to prevent rendering issues
            opacity: 0,
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: 1,
                pin: true
            }
        });

        // 3. The Master Pinning Sequence (Logical Card Stacking)
        const workTl = gsap.timeline({
            scrollTrigger: {
                trigger: "#work-trigger",
                start: "top top",
                end: "+=3000",
                scrub: 1,
                pin: true,
                anticipatePin: 1
            }
        });

        // Panel 1 - Fade in & Parallax Image
        workTl.set("#panel-1", { visibility: "visible" })
              .from("#panel-1 .card", { xPercent: -150, rotate: -20, duration: 1 })
              .from("#panel-1 img", { scale: 1.5, duration: 1 }, "<");

        // Panel 2 - Slides over Panel 1
        workTl.set("#panel-2", { visibility: "visible" })
              .from("#panel-2 .card", { xPercent: 150, rotate: 20, duration: 1 })
              .to("#panel-1 .card", { scale: 0.8, opacity: 0.5, duration: 1 }, "<");

        // Panel 3 - Slides up from bottom
        workTl.set("#panel-3", { visibility: "visible" })
              .from("#panel-3 .card", { yPercent: 150, duration: 1 })
              .to("#panel-2 .card", { scale: 0.8, opacity: 0.5, duration: 1 }, "<");

        // 4. Horizontal Conveyor Action (FIXED DIRECTION)
        // Calculate total width for proper scrolling
        const conveyorList = document.querySelector(".conveyor-list");
        const conveyorWidth = conveyorList.scrollWidth;
        
        gsap.to(".conveyor-list", {
            x: -conveyorWidth / 2, // Move left by half (since we duplicated items)
            ease: "none",
            scrollTrigger: {
                trigger: ".conveyor-outer",
                start: "top top",
                end: "bottom bottom",
                scrub: 1,
                pin: ".conveyor-sticky" // Pin the sticky container instead
            }
        });

        // 5. Split Reveal Action (FIXED)
        const revealTl = gsap.timeline({
            scrollTrigger: {
                trigger: ".reveal-section",
                start: "top 80%",
                end: "center center",
                scrub: 1
            }
        });
        
        revealTl.to(".word-left", { x: "100vw", ease: "none" }, 0)
                .to(".word-right", { x: "-100vw", ease: "none" }, 0);

        // 6. Final Letter Spacing Action
        gsap.from("#outro-text", {
            letterSpacing: "-1em",
            opacity: 0,
            scrollTrigger: {
                trigger: ".footer",
                start: "top bottom",
                end: "bottom bottom",
                scrub: 1
            }
        });

    </script>
</body>
</html>
