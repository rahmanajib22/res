<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Scroll Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --accent: #e0ff00;
            --text: #ffffff;
            --card-w: 45vw;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* Smooth Scroll */
        html.lenis { height: auto; }
        .lenis-smooth { scroll-behavior: auto !important; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Hero Section */
        .hero {
            height: 150vh; /* Extra tall */
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .hero-title {
            font-size: 15vw;
            font-weight: 900;
            text-align: center;
            line-height: 0.8;
            z-index: 2;
        }

        .hero-sub {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 5vw;
            color: var(--accent);
            z-index: 3;
            transform: translateY(100px);
        }

        /* Tall Content Sections */
        .content-block {
            position: relative;
            padding: 40vh 0; /* Massive vertical spacing */
        }

        .parallax-bg-text {
            position: absolute;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Cinematic Cards */
        .card-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 20vh 0;
        }

        .card {
            width: var(--card-w);
            height: 65vh;
            background: #111;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.5);
            transition: 0.5s;
        }

        .card:hover img { filter: grayscale(0) brightness(0.8); }

        .card-info {
            position: absolute;
            bottom: 40px;
            left: 40px;
        }

        .card-info h3 { font-size: 3rem; font-weight: 900; }

        /* Conveyor Section */
        .conveyor-wrap {
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            background: #fff;
            color: #000;
        }

        .conveyor-list {
            display: flex;
            gap: 100px;
            font-size: 12vw;
            font-weight: 900;
            white-space: nowrap;
            will-change: transform;
        }

        .footer {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .footer h2 { font-size: 5vw; max-width: 60%; margin-bottom: 2rem;}

        /* Line decoration */
        .scroll-line {
            position: fixed;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(255,255,255,0.1);
            z-index: -1;
        }
    </style>
</head>
<body>

    <nav>
        <div>EST. 2026</div>
        <div>CINEMATIC REEL</div>
        <div>CONTACT</div>
    </nav>

    <div class="scroll-line"></div>

    <main>
        <section class="hero">
            <h1 class="hero-title">ULTRA<br>MOTION</h1>
            <div class="hero-sub">Digital Director</div>
        </section>

        <section class="content-block">
            <div class="parallax-bg-text">STORYTELLING</div>
            
            <div class="card-wrapper" style="justify-content: flex-start; padding-left: 10%;">
                <div class="card" id="c1">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1000" alt="Work">
                    <div class="card-info"><h3>01. VISION</h3></div>
                </div>
            </div>

            <div class="card-wrapper" style="justify-content: flex-end; padding-right: 10%;">
                <div class="card" id="c2">
                    <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?auto=format&fit=crop&q=80&w=1000" alt="Work">
                    <div class="card-info"><h3>02. DEPTH</h3></div>
                </div>
            </div>
        </section>

        <section class="conveyor-wrap">
            <div class="conveyor-list">
                <span>REIMAGINE</span> <span>●</span> <span>RESTRUCTURE</span> <span>●</span> <span>RELEASE</span>
            </div>
        </section>

        <section class="content-block">
             <div class="parallax-bg-text" style="color:var(--accent); opacity: 0.1;">INNOVATION</div>
             <div class="card-wrapper">
                <div class="card" id="c3" style="width: 70vw; height: 80vh;">
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=1500" alt="Work">
                    <div class="card-info"><h3>03. SCALE</h3></div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <h2>Let's build the next dimension.</h2>
            <p>© 2026 GENESIS STUDIO</p>
        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script>
        // 1. Heavy Smooth Scroll
        const lenis = new Lenis({
            duration: 2, // Slower, more cinematic feel
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            wheelMultiplier: 0.8 // Heavier feel
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        gsap.registerPlugin(ScrollTrigger);

        // 2. Hero 3D Reveal
        const heroTl = gsap.timeline({
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: true
            }
        });

        heroTl.to(".hero-title", { scale: 1.5, opacity: 0, rotateX: -20, y: -100 })
              .to(".hero-sub", { y: -300, scale: 0.5, opacity: 0 }, 0);

        // 3. Parallax Background Text
        document.querySelectorAll('.parallax-bg-text').forEach(text => {
            gsap.to(text, {
                x: -500,
                scrollTrigger: {
                    trigger: text,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: 1
                }
            });
        });

        // 4. Advanced Card Interaction (3D Slide & Scale)
        const animateCard = (id, xStart, xEnd) => {
            gsap.fromTo(id, 
                { x: xStart, opacity: 0, rotateY: xStart > 0 ? -30 : 30, scale: 0.8 },
                { 
                    x: 0, opacity: 1, rotateY: 0, scale: 1,
                    scrollTrigger: {
                        trigger: id,
                        start: "top bottom",
                        end: "top 20%",
                        scrub: 1,
                    }
                }
            );

            // Exit animation
            gsap.to(id, {
                opacity: 0,
                scale: 0.5,
                y: -100,
                scrollTrigger: {
                    trigger: id,
                    start: "bottom 40%",
                    end: "bottom top",
                    scrub: 1
                }
            });
        };

        animateCard("#c1", -500, 0);
        animateCard("#c2", 500, 0);
        animateCard("#c3", 0, 0); // Zoom only for center card

        // 5. Conveyor Movement
        gsap.to(".conveyor-list", {
            x: "-50%",
            scrollTrigger: {
                trigger: ".conveyor-wrap",
                start: "top bottom",
                end: "bottom top",
                scrub: 1
            }
        });

        // 6. Global Background Shift
        gsap.to("body", {
            scrollTrigger: {
                trigger: ".conveyor-wrap",
                start: "top bottom",
                end: "top top",
                scrub: true
            },
            backgroundColor: "#ffffff",
            color: "#000"
        });
        
        gsap.to("body", {
            scrollTrigger: {
                trigger: ".conveyor-wrap",
                start: "bottom bottom",
                end: "bottom top",
                scrub: true
            },
            backgroundColor: "#080808",
            color: "#fff"
        });
    </script>
</body>
</html>
