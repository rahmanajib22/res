<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Scroll Portfolio</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<!-- Lenis -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>

<style>
:root{
  --bg:#0a0a0a;
  --light:#f4f4f4;
  --card:#151515;
  --accent:#6ee7ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui;
}

body{
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* GENERAL */
section{
  min-height:100vh;
  padding:120px 6%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

h1{
  font-size:clamp(2rem,5vw,4rem);
  margin-bottom:20px;
}

p{
  opacity:.7;
  max-width:600px;
}

/* HERO */
.hero{
  align-items:center;
  text-align:center;
}

/* FLOATING ELEMENT */
.floating{
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  background: radial-gradient(circle, var(--accent), transparent);
  filter:blur(60px);
  top:20%;
  left:10%;
}

/* CARDS */
.cards{
  display:flex;
  flex-direction:column;
  gap:80px;
}

.card{
  width:60%;
  padding:40px;
  background:var(--card);
  border-radius:20px;
  backdrop-filter:blur(10px);
  transition:.4s;
}

.card:hover{
  transform:scale(1.05) rotate(-1deg);
}

.card:nth-child(even){
  align-self:flex-end;
}

/* HORIZONTAL */
.horizontal{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.track{
  display:flex;
  gap:40px;
  position:absolute;
  top:50%;
  transform:translateY(-50%);
}

.h-card{
  min-width:320px;
  height:220px;
  background:#1f1f1f;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.2rem;
}

/* PARALLAX */
.parallax{
  height:120vh;
  position:relative;
}

.layer{
  position:absolute;
  width:100%;
  height:100%;
}

.layer.bg{
  background:linear-gradient(#111,#000);
  z-index:1;
}

.layer.mid{
  background:radial-gradient(circle at center, #222, transparent);
  z-index:2;
}

.layer.front{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:3rem;
  z-index:3;
}

/* LIGHT SECTION */
.light{
  background:var(--light);
  color:#111;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:60px;
  opacity:.6;
}

/* RESPONSIVE */
@media(max-width:768px){
  .card{width:100%;}
  .h-card{min-width:240px;}
}
</style>
</head>

<body>

<div class="floating"></div>

<!-- HERO -->
<section class="hero">
  <h1>Scroll Controls Everything</h1>
  <p>This is not a website. It's a scroll-driven experience.</p>
</section>

<!-- SLIDING CARDS -->
<section>
  <div class="cards">
    <div class="card">Creative Project 01</div>
    <div class="card">Creative Project 02</div>
    <div class="card">Creative Project 03</div>
    <div class="card">Creative Project 04</div>
  </div>
</section>

<!-- PARALLAX DEPTH -->
<section class="parallax">
  <div class="layer bg"></div>
  <div class="layer mid"></div>
  <div class="layer front">Depth Motion</div>
</section>

<!-- HORIZONTAL SCROLL -->
<section class="horizontal">
  <div class="track">
    <div class="h-card">Project A</div>
    <div class="h-card">Project B</div>
    <div class="h-card">Project C</div>
    <div class="h-card">Project D</div>
    <div class="h-card">Project E</div>
    <div class="h-card">Project F</div>
  </div>
</section>

<!-- LIGHT BREAK -->
<section class="light">
  <h1>Smooth. Cinematic. Controlled.</h1>
</section>

<!-- FOOTER -->
<div class="footer">© 2026 Portfolio Experience</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* LENIS */
const lenis = new Lenis({ lerp:0.08 });

function raf(t){
  lenis.raf(t);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

lenis.on('scroll', ScrollTrigger.update);

gsap.ticker.add((t)=>{
  lenis.raf(t*1000);
});

gsap.ticker.lagSmoothing(0);

/* FLOATING ORB PARALLAX */
gsap.to(".floating",{
  y:200,
  x:200,
  scrollTrigger:{
    trigger:".hero",
    start:"top top",
    end:"bottom top",
    scrub:true
  }
});

/* CARDS SLIDE */
gsap.utils.toArray(".card").forEach((card,i)=>{
  let dir = i % 2 === 0 ? -300 : 300;

  gsap.fromTo(card,
    { x:dir, rotate: i%2?5:-5 },
    {
      x:0,
      rotate:0,
      ease:"power4.out",
      scrollTrigger:{
        trigger:card,
        start:"top 85%",
        end:"top 30%",
        scrub:true
      }
    }
  );
});

/* PARALLAX LAYERS */
gsap.to(".layer.bg",{
  y:100,
  scrollTrigger:{
    trigger:".parallax",
    scrub:true
  }
});

gsap.to(".layer.mid",{
  y:200,
  scrollTrigger:{
    trigger:".parallax",
    scrub:true
  }
});

gsap.to(".layer.front",{
  y:300,
  scrollTrigger:{
    trigger:".parallax",
    scrub:true
  }
});

/* HORIZONTAL SCROLL */
const track = document.querySelector(".track");

gsap.to(track,{
  x:()=> -(track.scrollWidth - window.innerWidth),
  ease:"none",
  scrollTrigger:{
    trigger:".horizontal",
    start:"top top",
    end:()=> "+=" + track.scrollWidth,
    scrub:true,
    pin:true
  }
});

</script>

</body>
</html>
