<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Motion Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #00ffcc;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* Smooth Scroll Setup */
        html.lenis {
            height: auto;
        }
        .lenis-smooth {
            scroll-behavior: auto !important;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            mix-blend-mode: difference;
        }

        .logo { font-weight: 900; letter-spacing: -1px; font-size: 1.2rem; }

        /* Sections */
        section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero {
            align-items: center;
            overflow: hidden;
        }

        .hero-title {
            font-size: clamp(3rem, 12vw, 15rem);
            font-weight: 900;
            text-align: center;
            line-height: 0.8;
            text-transform: uppercase;
        }

        /* Interactive Project Cards */
        .projects-container {
            padding: 10vh 0;
        }

        .project-row {
            width: 100%;
            display: flex;
            padding: 10vh 5%;
            perspective: 1000px;
        }

        .project-card {
            width: 45%;
            aspect-ratio: 16/10;
            background: var(--card-bg);
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            border-radius: 4px;
            position: relative;
            transition: border-color 0.4s ease;
        }

        .project-card:hover {
            border-color: var(--accent);
        }

        .project-card h3 { font-size: 2rem; margin-bottom: 10px; }
        .project-card p { color: #666; }

        .row-right { justify-content: flex-end; }

        /* Conveyor Belt / Marquee */
        .conveyor-section {
            background: var(--accent);
            color: #000;
            height: 60vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .conveyor-track {
            display: flex;
            white-space: nowrap;
            gap: 50px;
            will-change: transform;
        }

        .conveyor-track h2 {
            font-size: 15vw;
            font-weight: 900;
            text-transform: uppercase;
        }

        .footer-spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .project-card { width: 90%; }
            .project-row { justify-content: center !important; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GENESIS.STUDIO</div>
        <div>MENU</div>
    </nav>

    <main>
        <section class="hero">
            <h1 class="hero-title">BEYOND<br><span style="color:var(--accent)">MOTION</span></h1>
        </section>

        <section class="projects-container">
            <div class="project-row">
                <div class="project-card" id="p1">
                    <h3>NEBULA OS</h3>
                    <p>Interface Design & Motion</p>
                </div>
            </div>

            <div class="project-row row-right">
                <div class="project-card" id="p2">
                    <h3>CYBER ARCHIVE</h3>
                    <p>Full Stack Development</p>
                </div>
            </div>

            <div class="project-row">
                <div class="project-card" id="p3">
                    <h3>VOID ENGINE</h3>
                    <p>3D WebGL Interaction</p>
                </div>
            </div>
        </section>

        <section class="conveyor-section">
            <div class="conveyor-track">
                <h2>CRAFTING THE FUTURE — CRAFTING THE FUTURE — </h2>
            </div>
        </section>

        <section class="footer-spacer">
            <h2 style="font-size: 3rem;">SCROLL UP TO REVERSE</h2>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script>
        // Initialize Lenis for Inertial Smooth Scrolling
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: 'vertical',
            gestureOrientation: 'vertical',
            smoothWheel: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Link GSAP to Lenis
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });

        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);

        // 1. Hero Parallax
        gsap.to(".hero-title", {
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: true
            },
            y: 300,
            scale: 0.7,
            opacity: 0,
            rotateX: 45
        });

        // 2. Card Slide Animations (The "Physical Connection")
        const cards = document.querySelectorAll('.project-card');
        
        cards.forEach((card, index) => {
            const direction = index % 2 === 0 ? -1 : 1; // Alternate sides
            
            // Timeline for entry AND exit
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: card,
                    start: "top bottom", // Start as card enters bottom
                    end: "bottom top",    // End as card leaves top
                    scrub: 1,             // Connects movement directly to scroll
                }
            });

            tl.fromTo(card, 
                { 
                    x: 400 * direction, 
                    rotate: 15 * direction, 
                    opacity: 0 
                },
                { 
                    x: 0, 
                    rotate: 0, 
                    opacity: 1, 
                    duration: 1 
                }
            )
            .to(card, {
                x: -400 * direction,
                rotate: -15 * direction,
                opacity: 0,
                duration: 1
            }, "+=0.5"); // Pause briefly in the center
        });

        // 3. Conveyor Belt Logic
        gsap.to(".conveyor-track", {
            x: "-30%", // Moves the text horizontally
            scrollTrigger: {
                trigger: ".conveyor-section",
                start: "top bottom",
                end: "bottom top",
                scrub: 2 // Higher number = more "weight" or inertia
            }
        });

        // 4. Background Color Shift
        gsap.to("body", {
            scrollTrigger: {
                trigger: ".conveyor-section",
                start: "top center",
                end: "bottom center",
                scrub: true,
                toggleActions: "play reverse play reverse"
            },
            backgroundColor: "#00ffcc",
            duration: 1
        });
    </script>
</body>
</html>
