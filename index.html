<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Motion v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #ff3e00; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* 1. Progress Bar Concept */
        .scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: var(--accent); z-index: 10000;
        }

        section { position: relative; width: 100%; min-height: 100vh; overflow: hidden; }

        /* 2. Hero Lens Blur Concept */
        .hero { display: flex; align-items: center; justify-content: center; background: #050505; }
        .hero-title { font-size: 12vw; font-weight: 900; filter: blur(20px); transform: scale(1.5); opacity: 0; }

        /* 3. The "Stacking" Pinned Cards */
        .stack-section { height: 400vh; background: #0a0a0a; }
        .stack-container { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .stack-card {
            position: absolute; width: 50vw; height: 60vh; background: #1a1a1a;
            border: 1px solid #333; border-radius: 20px; display: flex;
            align-items: center; justify-content: center; font-size: 2rem;
            transform-origin: bottom center;
        }

        /* 4. Horizontal Conveyor (Precise Control) */
        .conveyor-section { height: 300vh; background: var(--accent); color: #000; }
        .conveyor-sticky { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; }
        .conveyor-track { display: flex; gap: 100px; padding: 0 50px; will-change: transform; }
        .conveyor-item { font-size: 15vw; font-weight: 900; white-space: nowrap; line-height: 1; }

        /* 5. Split Reveal Concept */
        .split-section { display: flex; height: 100vh; }
        .split-side { width: 50%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5vw; font-weight: 900; }
        .left-side { background: #111; transform: translateX(-100%); }
        .right-side { background: #222; transform: translateX(100%); }

        /* 6. Text Scramble/Fill Concept */
        .text-fill-section { height: 200vh; display: flex; align-items: center; justify-content: center; }
        .text-fill { font-size: 6vw; font-weight: 900; color: rgba(255,255,255,0.1); position: sticky; top: 40%; }
        .text-fill span { color: var(--accent); display: inline-block; width: 0; overflow: hidden; white-space: nowrap; transition: 0.1s; }

        /* 7. 3D Floating Elements */
        .float-box { position: absolute; width: 200px; height: 200px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); }

        /* 8. Zoom Reveal */
        .zoom-section { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .zoom-circle { width: 100px; height: 100px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }

        /* 9. Background Inversion */
        .invert-trigger { height: 100vh; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-size: 4vw; }

        /* 10. Cinematic Outro */
        .outro { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="scroll-progress"></div>

    <main>
        <section class="hero">
            <h1 class="hero-title">CINEMATIC</h1>
        </section>

        <section class="stack-section">
            <div class="stack-container">
                <div class="stack-card" style="z-index: 3;">01. THE VISION</div>
                <div class="stack-card" style="z-index: 2;">02. THE DEPTH</div>
                <div class="stack-card" style="z-index: 1;">03. THE MOTION</div>
            </div>
        </section>

        <section class="conveyor-section">
            <div class="conveyor-sticky">
                <div class="conveyor-track">
                    <div class="conveyor-item">CONTROLLED</div>
                    <div class="conveyor-item">—</div>
                    <div class="conveyor-item">HORIZONTAL</div>
                    <div class="conveyor-item">—</div>
                    <div class="conveyor-item">SCROLLING</div>
                </div>
            </div>
        </section>

        <section class="split-section">
            <div class="split-side left-side">CREATIVE</div>
            <div class="split-side right-side">ENGINE</div>
        </section>

        <section class="text-fill-section">
            <div class="text-fill">THE FUTURE IS <span>THE FUTURE IS</span></div>
        </section>

        <section style="height: 150vh;">
            <div class="float-box" style="top: 20%; left: 10%;"></div>
            <div class="float-box" style="top: 50%; left: 70%;"></div>
            <div class="float-box" style="top: 80%; left: 30%;"></div>
            <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
                <h2 style="font-size: 5vw; z-index: 10;">PARALLAX DEBRIS</h2>
            </div>
        </section>

        <section class="zoom-section">
            <div class="zoom-circle">EXPLORE</div>
        </section>

        <section class="invert-trigger">
            <h2>COLOR INVERSION</h2>
        </section>

        <section class="outro">
            <p>END OF EXPERIENCE</p>
            <h2 style="font-size: 3vw;">SCROLL UP TO REPLAY</h2>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- LENIS SMOOTH SCROLL (Inertia) ---
        const lenis = new Lenis({ duration: 1.5, lerp: 0.05 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // 1. Progress Bar
        gsap.to(".scroll-progress", {
            width: "100%", scrollTrigger: { scrub: 0.3 }
        });

        // 2. Hero Lens Reveal
        gsap.to(".hero-title", {
            filter: "blur(0px)", scale: 1, opacity: 1,
            scrollTrigger: { trigger: ".hero", start: "top top", end: "bottom top", scrub: true }
        });

        // 3. Stacking Cards (Physical Pinning)
        const cards = gsap.utils.toArray(".stack-card");
        cards.forEach((card, i) => {
            gsap.fromTo(card, 
                { scale: 1, yPercent: 0 },
                { 
                    scale: 1 - (i * 0.05), 
                    yPercent: -100 * (cards.length - i),
                    scrollTrigger: {
                        trigger: ".stack-section",
                        start: () => `top+=${i * 500} top`,
                        end: "bottom top",
                        scrub: true,
                    }
                }
            );
        });

        // 4. Conveyor (Pinned Horizontal)
        gsap.to(".conveyor-track", {
            x: "-70%",
            scrollTrigger: {
                trigger: ".conveyor-section",
                start: "top top",
                end: "bottom top",
                pin: true,
                scrub: 1
            }
        });

        // 5. Split Reveal
        const splitTl = gsap.timeline({
            scrollTrigger: { trigger: ".split-section", start: "top 80%", end: "top 20%", scrub: 1 }
        });
        splitTl.to(".left-side", { x: "0%" }, 0).to(".right-side", { x: "0%" }, 0);

        // 6. Text Fill
        gsap.to(".text-fill span", {
            width: "100%",
            scrollTrigger: { trigger: ".text-fill-section", start: "top top", end: "bottom top", pin: true, scrub: 1 }
        });

        // 7. Parallax Debris
        gsap.utils.toArray(".float-box").forEach(box => {
            gsap.to(box, {
                y: -400, rotate: 360,
                scrollTrigger: { trigger: box, start: "top bottom", end: "bottom top", scrub: 2 }
            });
        });

        // 8. Zoom Circle Expand
        gsap.to(".zoom-circle", {
            scale: 50,
            scrollTrigger: { trigger: ".zoom-section", start: "top top", end: "bottom top", pin: true, scrub: 1 }
        });

        // 9. Inversion
        gsap.to("body", {
            backgroundColor: "#fff", color: "#000",
            scrollTrigger: { trigger: ".invert-trigger", start: "top 50%", end: "bottom 50%", scrub: true }
        });

        // 10. Outro Scale
        gsap.from(".outro h2", {
            letterSpacing: "50px", opacity: 0,
            scrollTrigger: { trigger: ".outro", start: "top bottom", end: "bottom bottom", scrub: 1 }
        });

    </script>
</body>
</html>
