<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Audio Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #ff3e00; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Audio Unlock Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }
        #overlay h2 { font-size: 1.5rem; letter-spacing: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Progress Bar */
        .scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: var(--accent); z-index: 9999;
        }

        section { position: relative; width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Hero */
        .hero-title { font-size: clamp(3rem, 12vw, 15rem); font-weight: 900; filter: blur(20px); transform: scale(1.5); opacity: 0; text-transform: uppercase; }

        /* Stacking Section */
        .stack-section { height: 400vh; background: #0a0a0a; }
        .stack-container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .stack-card {
            position: absolute; 
            width: clamp(280px, 65vw, 850px); 
            height: clamp(350px, 60vh, 550px); 
            background: #1a1a1a; border: 1px solid #333; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 2rem; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            transform: translateY(110vh) rotate(5deg);
        }

        /* Conveyor */
        .conveyor-section { height: 200vh; background: var(--accent); color: #000; }
        .conveyor-track { display: flex; gap: 5vw; padding: 0 50px; will-change: transform; }
        .conveyor-item { font-size: clamp(3rem, 15vw, 12rem); font-weight: 900; white-space: nowrap; }

        /* Text Fill */
        .text-fill-section { height: 200vh; background: #000; }
        .text-fill { font-size: clamp(2rem, 6vw, 8vw); font-weight: 900; color: rgba(255,255,255,0.1); width: 90%; text-align: center; }
        .text-fill span { color: var(--accent); display: inline-block; width: 0; overflow: hidden; white-space: nowrap; }

        /* Audio Controls */
        .mute-btn { position: fixed; bottom: 30px; right: 30px; z-index: 1000; background: none; border: 1px solid #fff; color: #fff; padding: 10px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="overlay"><h2>CLICK TO START EXPERIENCE</h2></div>
    <div class="scroll-progress"></div>
    <button class="mute-btn" id="muteToggle">SOUND ON</button>

    <main>
        <section class="hero">
            <h1 class="hero-title">AUDIO.VISUAL</h1>
        </section>

        <section class="stack-section">
            <div class="stack-container">
                <div class="stack-card card-1" style="z-index: 10;">
                    <h2>01. SONIC</h2>
                    <p style="margin-top: 1rem; opacity: 0.5;">Reactive sound triggers on scroll.</p>
                </div>
                <div class="stack-card card-2" style="z-index: 9;">
                    <h2>02. TACTILE</h2>
                    <p style="margin-top: 1rem; opacity: 0.5;">Hover for UI feedback sounds.</p>
                </div>
                <div class="stack-card card-3" style="z-index: 8;">
                    <h2>03. FLOW</h2>
                    <p style="margin-top: 1rem; opacity: 0.5;">Ambient drones fill the space.</p>
                </div>
            </div>
        </section>

        <section class="conveyor-section">
            <div class="conveyor-track">
                <div class="conveyor-item">CINEMATIC</div>
                <div class="conveyor-item">—</div>
                <div class="conveyor-item">AUDIO</div>
                <div class="conveyor-item">—</div>
                <div class="conveyor-item">IMMERSION</div>
            </div>
        </section>

        <section class="text-fill-section">
            <div class="text-fill">LISTEN TO THE MOTION <span>LISTEN TO THE MOTION</span></div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Audio Engine Setup
        const sfx = {
            woosh: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            hover: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            drone: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3')
        };
        sfx.woosh.volume = 0.3;
        sfx.hover.volume = 0.2;
        sfx.drone.volume = 0.1;
        sfx.drone.loop = true;

        let isMuted = false;
        const overlay = document.getElementById('overlay');
        
        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            sfx.drone.play();
        });

        document.getElementById('muteToggle').addEventListener('click', (e) => {
            isMuted = !isMuted;
            sfx.drone.muted = isMuted;
            e.target.innerText = isMuted ? "SOUND OFF" : "SOUND ON";
        });

        function playSfx(type) {
            if(!isMuted) {
                sfx[type].currentTime = 0;
                sfx[type].play();
            }
        }

        // 2. Smooth Scroll
        const lenis = new Lenis({ duration: 1.2, lerp: 0.1 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // 3. Hero Animation
        gsap.to(".hero-title", {
            filter: "blur(0px)", scale: 1, opacity: 1,
            scrollTrigger: { trigger: ".hero", start: "top top", end: "bottom top", scrub: true, pin: true }
        });

        // 4. Stacking Cards Timeline with Sound Triggers
        const stackTl = gsap.timeline({
            scrollTrigger: {
                trigger: ".stack-section",
                start: "top top",
                end: "bottom top",
                pin: true,
                scrub: 1,
                onUpdate: (self) => {
                    // Trigger woosh sound when card is roughly halfway through its motion
                    const p = self.progress;
                    if ((p > 0.25 && p < 0.27) || (p > 0.55 && p < 0.57) || (p > 0.85 && p < 0.87)) {
                        playSfx('woosh');
                    }
                }
            }
        });

        stackTl.to(".card-1", { y: 0, rotate: 0, duration: 1 })
               .to(".card-2", { y: 0, rotate: -3, x: 10, duration: 1 }, "+=0.2")
               .to(".card-1", { scale: 0.9, opacity: 0.4, duration: 1 }, "<")
               .to(".card-3", { y: 0, rotate: 3, x: -10, duration: 1 }, "+=0.2")
               .to(".card-2", { scale: 0.9, opacity: 0.4, duration: 1 }, "<");

        // 5. Hover Sounds
        document.querySelectorAll('.stack-card').forEach(card => {
            card.addEventListener('mouseenter', () => playSfx('hover'));
        });

        // 6. Conveyor
        gsap.to(".conveyor-track", {
            x: "-70%",
            scrollTrigger: { trigger: ".conveyor-section", start: "top top", end: "bottom top", pin: true, scrub: 1 }
        });

        // 7. Text Fill
        gsap.to(".text-fill span", {
            width: "100%",
            scrollTrigger: { trigger: ".text-fill-section", start: "top top", end: "bottom top", pin: true, scrub: 1 }
        });

        window.addEventListener('resize', () => ScrollTrigger.refresh());
    </script>
</body>
</html>
