<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Motion | Refined</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #ff3e00; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: var(--accent); z-index: 10000;
        }

        section { position: relative; width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* Hero */
        .hero { background: #000; z-index: 10; }
        .hero-title { font-size: clamp(3rem, 15vw, 12rem); font-weight: 900; filter: blur(20px); opacity: 0; text-transform: uppercase; }

        /* Stacking Section - PINNED */
        .stack-section { 
            height: 100vh; /* Controlled by GSAP Pinning */
            background: #000;
            overflow: hidden;
        }

        .stack-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .stack-card {
            position: absolute; 
            width: clamp(280px, 70vw, 900px); 
            height: clamp(350px, 60vh, 600px); 
            background: #111;
            border: 1px solid #333; 
            border-radius: clamp(10px, 2vw, 30px); 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 2rem;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            transform: translateY(100vh) rotate(10deg); /* Start off-screen */
        }

        .stack-card h2 { font-size: clamp(1.5rem, 5vw, 4rem); font-weight: 900; text-align: center; }

        /* Conveyor */
        .conveyor-section { height: 100vh; background: var(--accent); color: #000; overflow: hidden; }
        .conveyor-track { display: flex; gap: 5vw; padding: 0 2rem; will-change: transform; }
        .conveyor-item { font-size: clamp(4rem, 18vw, 15rem); font-weight: 900; white-space: nowrap; }

        /* Text Fill */
        .text-fill-section { height: 100vh; background: #000; }
        .text-fill { font-size: clamp(2rem, 8vw, 7rem); font-weight: 900; color: rgba(255,255,255,0.1); text-align: center; width: 90%; }
        .text-fill span { color: var(--accent); display: inline-block; width: 0; overflow: hidden; white-space: nowrap; vertical-align: bottom; }

        /* Responsiveness for small screens */
        @media (max-width: 768px) {
            .stack-card { width: 85vw; height: 50vh; }
            .text-fill { font-size: 10vw; }
        }
    </style>
</head>
<body>

    <div class="scroll-progress"></div>

    <main>
        <section class="hero">
            <h1 class="hero-title">VISION</h1>
        </section>

        <section class="stack-section">
            <div class="stack-container">
                <div class="stack-card card-1">
                    <h2>01. IMMERSIVE</h2>
                    <p style="margin-top: 1rem; opacity: 0.6;">High-fidelity scroll interaction.</p>
                </div>
                <div class="stack-card card-2">
                    <h2>02. ADAPTIVE</h2>
                    <p style="margin-top: 1rem; opacity: 0.6;">Built for every modern device.</p>
                </div>
                <div class="stack-card card-3">
                    <h2>03. CINEMATIC</h2>
                    <p style="margin-top: 1rem; opacity: 0.6;">Controlled motion sequences.</p>
                </div>
            </div>
        </section>

        <section class="conveyor-section">
            <div class="conveyor-track">
                <div class="conveyor-item">PRECISION</div>
                <div class="conveyor-item">—</div>
                <div class="conveyor-item">MOTION</div>
                <div class="conveyor-item">—</div>
                <div class="conveyor-item">DESIGN</div>
            </div>
        </section>

        <section class="text-fill-section">
            <div class="text-fill">THE FUTURE IS <span>THE FUTURE IS</span></div>
        </section>

        <section style="height: 60vh; background: #000;">
            <h2 style="font-size: 1.5rem; letter-spacing: 5px; opacity: 0.4;">FIN</h2>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const lenis = new Lenis({ duration: 1.2, lerp: 0.1 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Progress Bar
        gsap.to(".scroll-progress", {
            width: "100%", scrollTrigger: { scrub: 0.3 }
        });

        // 1. Hero Animation
        gsap.to(".hero-title", {
            filter: "blur(0px)", opacity: 1, scale: 0.9,
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: true,
                pin: true
            }
        });

        // 2. MASTER PINNED STACKING CARDS
        // We create one timeline for the entire pinned section
        const stackTl = gsap.timeline({
            scrollTrigger: {
                trigger: ".stack-section",
                start: "top top",
                end: "+=300% top", // Scroll distance is 3x the screen height
                pin: true,
                scrub: 1,
                anticipatePin: 1
            }
        });

        // Card 1 Reveal
        stackTl.to(".card-1", { y: 0, rotate: 0, duration: 1 });
        stackTl.to({}, { duration: 0.5 }); // PAUSE for reading

        // Card 2 Slides Over Card 1
        stackTl.to(".card-1", { scale: 0.9, opacity: 0.5, y: -20, duration: 1 }, "c2")
               .to(".card-2", { y: 0, rotate: 0, duration: 1 }, "c2");
        stackTl.to({}, { duration: 0.5 }); // PAUSE

        // Card 3 Slides Over Card 2
        stackTl.to(".card-2", { scale: 0.85, opacity: 0.3, y: -40, duration: 1 }, "c3")
               .to(".card-3", { y: 0, rotate: 0, duration: 1 }, "c3");
        stackTl.to({}, { duration: 0.8 }); // Final PAUSE

        // 3. Pinned Conveyor
        gsap.to(".conveyor-track", {
            x: "-60%",
            scrollTrigger: {
                trigger: ".conveyor-section",
                start: "top top",
                end: "+=200% top",
                pin: true,
                scrub: 1
            }
        });

        // 4. Text Fill
        gsap.to(".text-fill span", {
            width: "100%",
            scrollTrigger: {
                trigger: ".text-fill-section",
                start: "top top",
                end: "+=100% top",
                pin: true,
                scrub: 1
            }
        });

        // Optimization: Refresh ScrollTrigger on resize
        window.addEventListener("resize", () => ScrollTrigger.refresh());
    </script>
</body>
</html>
