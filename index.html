<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Scroll Fixed</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #000;
    --accent: #ff3e00;
    --text: #fff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

/* Progress bar */
.scroll-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 4px;
    background: var(--accent);
    z-index: 9999;
}

section {
    width: 100%;
    min-height: 100vh;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
}

.hero-title {
    font-size: clamp(40px, 12vw, 160px);
    font-weight: 900;
    filter: blur(20px);
    transform: scale(1.4);
    opacity: 0;
}

/* STACK CARDS */
.stack-section {
    height: 500vh;
    background: #0a0a0a;
}

.stack-container {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.stack-card {
    position: absolute;
    width: clamp(260px, 60vw, 700px);
    height: clamp(180px, 50vh, 500px);
    padding: 2rem;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.2rem, 2vw, 2rem);
    text-align: center;
}

/* CONVEYOR */
.conveyor-section {
    height: 250vh;
    background: var(--accent);
    color: #000;
}

.conveyor-sticky {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    align-items: center;
}

.conveyor-track {
    display: flex;
    gap: 80px;
    padding: 0 40px;
}

.conveyor-item {
    font-size: clamp(40px, 12vw, 140px);
    font-weight: 900;
    white-space: nowrap;
}

/* SPLIT */
.split-section {
    display: flex;
    height: 100vh;
}

.split-side {
    width: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(30px, 5vw, 80px);
    font-weight: 900;
}

.left-side {
    background: #111;
    transform: translateX(-100%);
}

.right-side {
    background: #222;
    transform: translateX(100%);
}

/* TEXT FILL */
.text-fill-section {
    height: 200vh;
    display: flex;
    justify-content: center;
}

.text-fill {
    position: sticky;
    top: 40%;
    font-size: clamp(30px, 6vw, 90px);
    font-weight: 900;
    color: rgba(255,255,255,0.1);
}

.text-fill span {
    color: var(--accent);
    display: inline-block;
    width: 0;
    overflow: hidden;
}

/* OUTRO */
.outro {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
</style>
</head>

<body>

<div class="scroll-progress"></div>

<main>

<section class="hero">
    <h1 class="hero-title">CINEMATIC</h1>
</section>

<section class="stack-section">
    <div class="stack-container">
        <div class="stack-card">01. THE VISION</div>
        <div class="stack-card">02. THE DEPTH</div>
        <div class="stack-card">03. THE MOTION</div>
    </div>
</section>

<section class="conveyor-section">
    <div class="conveyor-sticky">
        <div class="conveyor-track">
            <div class="conveyor-item">CONTROLLED</div>
            <div class="conveyor-item">—</div>
            <div class="conveyor-item">HORIZONTAL</div>
            <div class="conveyor-item">—</div>
            <div class="conveyor-item">SCROLL</div>
        </div>
    </div>
</section>

<section class="split-section">
    <div class="split-side left-side">CREATIVE</div>
    <div class="split-side right-side">ENGINE</div>
</section>

<section class="text-fill-section">
    <div class="text-fill">
        THE FUTURE IS <span>THE FUTURE IS</span>
    </div>
</section>

<section class="outro">
    <h2>END OF EXPERIENCE</h2>
</section>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

/* SMOOTH SCROLL */
const lenis = new Lenis({
    duration: 1.8,
    lerp: 0.07,
    smoothWheel: true
});

function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* PROGRESS */
gsap.to(".scroll-progress", {
    width: "100%",
    scrollTrigger: { scrub: 0.3 }
});

/* HERO */
gsap.to(".hero-title", {
    filter: "blur(0px)",
    scale: 1,
    opacity: 1,
    scrollTrigger: {
        trigger: ".hero",
        start: "top top",
        end: "bottom top",
        scrub: true
    }
});

/* STACK CARDS FIXED */
const cards = gsap.utils.toArray(".stack-card");

cards.forEach((card, i) => {
    gsap.fromTo(card,
        { y: 0, scale: 1 },
        {
            y: -150 * (cards.length - i),
            scale: 1 - (i * 0.08),
            ease: "power2.out",
            scrollTrigger: {
                trigger: ".stack-section",
                start: () => `top+=${i * 600} top`,
                end: "+=800",
                scrub: 1.5
            }
        }
    );
});

/* CONVEYOR */
gsap.to(".conveyor-track", {
    x: "-60%",
    scrollTrigger: {
        trigger: ".conveyor-section",
        start: "top top",
        end: "bottom top",
        pin: true,
        scrub: 1
    }
});

/* SPLIT */
gsap.timeline({
    scrollTrigger: {
        trigger: ".split-section",
        start: "top 80%",
        end: "top 20%",
        scrub: 1
    }
})
.to(".left-side", { x: "0%" }, 0)
.to(".right-side", { x: "0%" }, 0);

/* TEXT FILL */
gsap.to(".text-fill span", {
    width: "100%",
    scrollTrigger: {
        trigger: ".text-fill-section",
        start: "top top",
        end: "bottom top",
        pin: true,
        scrub: 1
    }
});
</script>

</body>
</html>
